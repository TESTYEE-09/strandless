<!doctype html><html lang="en-AU"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#f1eee7"><title>Strandless — Worn Free</title><style>html,body{height:100%;margin:0}body{display:grid;place-items:center;background:#f1eee7;color:#191a16;font:500 14px/1.4 system-ui,sans-serif;letter-spacing:.14em;text-transform:uppercase}.load{text-align:center}.mark{width:48px;height:48px;margin:0 auto 18px;position:relative}.mark:before,.mark:after{content:"";position:absolute;background:#191a16}.mark:before{width:1px;height:48px;left:24px}.mark:after{height:1px;width:48px;top:24px}.bar{width:180px;height:1px;background:#cec8ba;margin-top:18px;overflow:hidden}.bar i{display:block;width:45%;height:100%;background:#191a16;animation:a 1s infinite ease-in-out}@keyframes a{from{transform:translateX(-110%)}to{transform:translateX(230%)}}</style></head><body><div class="load"><div class="mark"></div>Strandless<div class="bar"><i></i></div></div><script>(async()=>{try{const a=[];for(let i=0;i<3;i++){const r=await fetch(`data/page-${i}.txt`,{cache:'no-store'});if(!r.ok)throw Error('Missing site data');a.push(await r.text())}document.open();document.write(a.join(''));document.close()}catch(e){document.body.innerHTML='<main style="max-width:32rem;padding:2rem;text-align:center"><h1>Strandless</h1><p>The site could not load. Refresh in a moment.</p></main>';console.error(e)}})()</script></body></html>
