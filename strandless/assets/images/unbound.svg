<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 554" width="480" height="554">
<defs>
<filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
  <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#171712" flood-opacity=".25"/>
</filter>
<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="18"/>
</filter>
<filter id="mono">
  <feColorMatrix type="saturate" values=".12"/>
  <feComponentTransfer><feFuncR type="linear" slope="1.08"/><feFuncG type="linear" slope="1.04"/><feFuncB type="linear" slope=".96"/></feComponentTransfer>
</filter>
<pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="2" seed="11"/></filter>
  <rect width="90" height="90" filter="url(#noise)" opacity=".055"/>
</pattern>
</defs>

<rect width="480" height="554" fill="#ded8cc"/>
<ellipse cx="240" cy="500" rx="154" ry="24" fill="#38352f" opacity=".16" filter="url(#soft)"/>
<g filter="url(#shadow)">
  <path d="M151 112l-78 48 42 87 55-27v259h140V220l55 27 42-87-78-48-51 30h-76z" fill="#efe9dd"/>
  <path d="M202 142c5 29 71 29 76 0" fill="none" stroke="#d3cab9" stroke-width="8"/>
  <path d="M151 112l51 30h76l51-30" fill="none" stroke="#d5ccbc" stroke-width="3"/>
  <path d="M170 220v259M310 220v259" stroke="#d8cfbf" opacity=".42"/>
  <circle cx="240" cy="278" r="59" fill="#1d1d19"/>
  <clipPath id="faceclip1"><circle cx="240" cy="278" r="53"/></clipPath>
  <image href="ethan-face.svg" x="187" y="225" width="106" height="106" preserveAspectRatio="xMidYMid slice" clip-path="url(#faceclip1)" filter="url(#mono)"/>
  <path d="M240 210v136M172 278h136" stroke="#efe9dd" stroke-width="3" opacity=".7"/>
  <text x="240" y="365" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="#1d1d19">MADE NEW</text>
  <text x="240" y="388" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" letter-spacing="2.4" fill="#585349">2 CORINTHIANS 5:17</text>
</g>
<text x="24" y="32" font-family="Arial,sans-serif" font-size="10" letter-spacing="2" fill="#4b473f">STRANDLESS / RELEASE 001</text>
<text x="456" y="527" text-anchor="end" font-family="Arial,sans-serif" font-size="9" letter-spacing="1.5" fill="#4b473f">ETHAN DART PORTRAIT EDITION</text>
<rect width="480" height="554" fill="url(#grain)"/>

</svg>