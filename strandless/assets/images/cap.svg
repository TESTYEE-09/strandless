  <path d="M111 313h274c24 0 50 20 63 46-72-15-144-19-217-12-52 5-95 17-134 31 1-32 6-52 14-65z" fill="#52583f"/>
  <path d="M255 142v179" stroke="#858a6d" stroke-width="3" opacity=".5"/>
  <ellipse cx="255" cy="235" rx="55" ry="61" fill="#ece7db"/>
  <clipPath id="faceclip4"><ellipse cx="255" cy="235" rx="48" ry="54"/></clipPath>
  <image href="ethan-face.svg" x="207" y="181" width="96" height="108" preserveAspectRatio="xMidYMid slice" clip-path="url(#faceclip4)" filter="url(#mono)"/>
  <path d="M255 174v122M209 235h92" stroke="#5b6046" stroke-width="3" opacity=".8"/>
  <text x="255" y="314" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#ece7db">GRACE &gt; FEAR</text>
</g>
<text x="24" y="32" font-family="Arial,sans-serif" font-size="10" letter-spacing="2" fill="#4d5040">STRANDLESS / 2 TIMOTHY 1:7</text>
