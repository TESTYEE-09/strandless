<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 554" width="480" height="554">
<defs>
<filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
  <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#171712" flood-opacity=".25"/>
</filter>
<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="18"/>
</filter>
<filter id="mono">
  <feColorMatrix type="saturate" values=".12"/>
  <feComponentTransfer><feFuncR type="linear" slope="1.08"/><feFuncG type="linear" slope="1.04"/><feFuncB type="linear" slope=".96"/></feComponentTransfer>
</filter>
<pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="2" seed="11"/></filter>
  <rect width="90" height="90" filter="url(#noise)" opacity=".055"/>
</pattern>
</defs>

<rect width="480" height="554" fill="#d7c7b2"/>
<ellipse cx="240" cy="500" rx="154" ry="24" fill="#3f3027" opacity=".16" filter="url(#soft)"/>
<g filter="url(#shadow)">
  <path d="M151 112l-78 48 42 87 55-27v259h140V220l55 27 42-87-78-48-51 30h-76z" fill="#765c47"/>
  <path d="M202 142c5 29 71 29 76 0" fill="none" stroke="#967b64" stroke-width="8"/>
  <rect x="177" y="211" width="126" height="164" rx="3" fill="#e6dfd4"/>
  <clipPath id="faceclip3"><rect x="186" y="220" width="108" height="108" rx="54"/></clipPath>
  <image href="ethan-face.svg" x="186" y="220" width="108" height="108" preserveAspectRatio="xMidYMid slice" clip-path="url(#faceclip3)" filter="url(#mono)"/>
  <path d="M240 211v120" stroke="#765c47" stroke-width="4" opacity=".85"/>
  <path d="M205 265h70" stroke="#765c47" stroke-width="4" opacity=".85"/>
  <text x="240" y="349" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#2e2923">THE WAY</text>
  <text x="240" y="365" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="2" fill="#5b5046">JOHN 14:6</text>
</g>
<text x="24" y="32" font-family="Arial,sans-serif" font-size="10" letter-spacing="2" fill="#59483b">STRANDLESS / THE WAY</text>
<text x="456" y="527" text-anchor="end" font-family="Arial,sans-serif" font-size="9" letter-spacing="1.5" fill="#59483b">ETHAN DART PORTRAIT EDITION</text>
<rect width="480" height="554" fill="url(#grain)"/>

</svg>